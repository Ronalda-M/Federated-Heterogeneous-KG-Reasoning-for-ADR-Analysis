seed: 7
device: auto
data:
  root: data/demo
  node_types: [Drug, ADR, Outcome, Symptom, Gender]
  edge_types:
    - [Drug, causes, ADR]
    - [ADR, resulted_in, Outcome]
    - [Drug, consumed_for, Symptom]
    - [Drug, consumed_by, Gender]
    - [Gender, affected_by, ADR]
model:
  hidden_dim: 256
  num_layers: 3
  heads: 6
  dropout: 0.3
  add_edge_features: true
  temporal_decay_lambda: 0.002
opt:
  lr: 0.002
  weight_decay: 0.01
  epochs: 30
  batch_size_edges: 8192
  negative_samples: 5
calibration:
  method: temperature
ablation:
  drop_ontology_norm: false
  drop_llm_links: false
  drop_edge_attribs: false
  drop_temporal: false
  shallow_layers: 0
