# Training Configuration

optimizer:
  name: AdamW
  lr: 2.0e-3
  weight_decay: 1.0e-4

loss:
  # Class-imbalance-aware weighted binary cross-entropy
  # w_{d,a} = softplus(gamma1 * conf_{d,a} + gamma2 * recency_{d,a})
  type: weighted_bce
  gamma1: 1.0               # weight on evidence confidence score
  gamma2: 0.5               # weight on recency score
  label_smoothing: 0.05

negative_sampling:
  # Type-aware: only Drug--ADR node-type pairs are sampled as negatives,
  # preventing trivially easy cross-type negatives from dominating the loss.
  strategy: type_constrained
  hard_negative_ratio: 0.3  # fraction of negatives that are co-mentioned
                             # but unconfirmed (hard negatives)
  negatives_per_positive: 5

calibration:
  # Post-hoc temperature scaling on validation set.
  # Learns a single scalar T: y_cal = sigmoid(s(d,a) / T)
  # Does not alter ranking order; optimises NLL on val predictions.
  method: temperature_scaling
  apply: true

early_stopping:
  monitor: val_pr_auc
  patience: 10
  min_delta: 1.0e-4

training:
  max_epochs: 200
  batch_size: 1024
  eval_every: 5             # evaluate on val set every N epochs
  seed: 42

splits:
  # Stratified by drug identity to prevent data leakage
  train: 0.70
  val:   0.15
  test:  0.15
  strategy: stratified_by_drug

evaluation:
  metrics:
    - precision
    - recall
    - f1
    - roc_auc
    - pr_auc
    - mrr
    - hits_at_1
    - hits_at_5
    - hits_at_10
  cold_start: true          # also evaluate on unseen drugs / ADRs
