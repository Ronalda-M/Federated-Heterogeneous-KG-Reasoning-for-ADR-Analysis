# Ablation: Without Ontology Normalisation  (−OntoNorm)
# 
# In this setting, drug and adverse-effect entities are not mapped to
# UMLS concept identifiers or MeSH / MedDRA preferred terms before KG
# construction.  Raw source identifiers are used directly, so cross-source
# entity alignment relies on string matching only.  Edge features and
# LLM-augmented links remain active.

name: no_onto_norm
description: UMLS / MeSH / MedDRA ontology mapping disabled.
             Raw identifiers from each source are used as-is.
             Assesses the contribution of semantic standardisation
             to cross-source entity resolution and downstream prediction.

inherits: configs/model.yaml

ablation:
  edge_features: true
  llm_augmented_links: true
  ontology_normalisation: false  # skip UMLS / MeSH / MedDRA mapping step

preprocessing:
  entity_normalisation: raw_id   # use source-native identifiers
  deduplication: within_source   # dedup within each DB only (no cross-source)
