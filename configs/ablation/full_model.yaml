# Ablation: Full Model (baseline for comparison)
name: full_model
description: All components enabled — edge features, LLM-augmented links,
             and ontology normalisation.

inherits: configs/model.yaml

ablation:
  edge_features: true        # provenance attributes phi_e(x_{(u,r,v)})
  llm_augmented_links: true  # MENTIONS and EVIDENCE_FOR edges from MedGemma-4B
  ontology_normalisation: true  # UMLS / MeSH / MedDRA mapping
