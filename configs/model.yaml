# Federated Heterogeneous KG Reasoning for ADR Prediction
# Model Configuration

gnn:
  hidden_dim: 256           # k: node embedding dimensionality
  num_layers: 3             # L: number of relational message-passing layers
  num_heads: 8              # H: attention heads per layer (GAT / HGT)
  dropout: 0.3              # applied to node features and attention weights
  fanouts: [20, 10]         # neighbourhood sampling per layer (GraphSAGE-style)
  nonlinearity: gelu        # Gaussian Error Linear Unit
  residual: true            # residual shortcut per node type
  layer_norm: true          # layer normalisation per node type

  # Supported architecture variants
  # Options: rgcn | hgt
  architecture: hgt

decoder:
  # Bilinear scoring for typed link prediction
  # s(d, a) = z_d^T R_causes z_a + psi(phi_e(x_{d,a}))
  relation_matrix_dim: 256
  edge_mlp_hidden: 64
  edge_mlp_layers: 2

node_types:
  - Drug
  - AdverseEffect
  - ClinicalFactor
  - Target
  - MedicalLiterature
  - BiomedicalReport

relation_types:
  - DRUG_CAUSES_AE
  - HAS_TARGET
  - ASSOCIATED_WITH
  - MENTIONS
  - EVIDENCE_FOR

# Input feature sources per node type
input_features:
  Drug:
    - medgemma_embedding     # MedGemma-4B contextual embedding
    - drugbank_molecular     # DrugBank molecular descriptors
    - faers_exposure_stats   # per-drug cumulative report count, 12-month rate,
                             # primary-suspect proportion
  AdverseEffect:
    - mesh_umls_embedding
    - frequency_stats
  ClinicalFactor:
    - mesh_umls_embedding
    - frequency_stats
  Target:
    - sequence_embedding
  MedicalLiterature:
    - medgemma_embedding
  BiomedicalReport:
    - structured_fields

  projection_dim: 256        # all node features projected to this dim via MLP
